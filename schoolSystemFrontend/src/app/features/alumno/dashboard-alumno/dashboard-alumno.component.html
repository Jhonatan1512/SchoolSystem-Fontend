<div class="courses-list">
    
    <div class="course-row" *ngFor="let curso of misCursos">
      
      <div class="row-icon" [ngClass]="curso.bg">
        <span class="material-symbols-outlined">{{ curso.icono }}</span>
      </div>
      
      <div class="row-info">
        <h4 class="course-name">{{ curso.nombre }} ({{curso.nombreAula}})</h4>
        <p class="teacher-name" *ngFor="let profe of curso.docente">
          <span class="material-symbols-outlined small-icon">person</span> 
          {{ profe }}  
        </p> 
      </div>   
 
      <div class="row-action">
        <button class="btn-arrow" (click)="verNotas(curso.id)"> 
          <span class="material-symbols-outlined">arrow_forward_ios</span>
        </button>
      </div>       
    </div>
  </div>
