<div class="login-wrapper">
  <div class="login-card">
    
    <div class="login-header">
      <img src="/logo.png" alt="EduSystem Logo" class="logo-img">
      <h2>Bienvenido de nuevo</h2>
      <p>Ingresa tus credenciales para acceder al portal</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" class="login-form">
      
      <div class="input-group">
        <label for="usuario">Usuario o Correo</label>
        <div class="input-icon-wrapper">
          <span class="material-symbols-outlined input-icon">person</span>
          <input 
            type="text" 
            id="usuario" 
            formControlName="usuario" 
            placeholder="Ej: jperez@colegio.edu.pe"
            [class.input-error]="loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched">
        </div>
        <span class="error-text" *ngIf="loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched">
          El usuario es obligatorio
        </span>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input 
            type="password" 
            id="password" 
            formControlName="password" 
            placeholder="••••••••"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
        <span class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria
        </span>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          Recordarme
        </label>
        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
      </div>

      <div class="api-error" *ngIf="mensajeError">
        <span class="material-symbols-outlined">error</span>
        {{ mensajeError }}
      </div>

      <button type="submit" class="btn-login" [disabled]="cargando">
        {{ cargando ? 'Verificando...' : 'Ingresar al Portal' }}
      </button>

    </form>
  </div>
</div>
